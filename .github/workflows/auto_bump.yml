name: Auto bump Grafana (OSS)

on:
  schedule:
    # Every day at 07:30
    - cron: "30 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-bump-grafana
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout testing branch
        uses: actions/checkout@v4
        with:
          ref: testing
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install tomlkit packaging

      - name: Run auto-bump script
        id: bump
        env:
          MANIFEST: "manifest.toml"
        run: |
          set -euo pipefail
          python scripts/auto_bump_grafana.py

      - name: Create Pull Request
        if: steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          base: testing
          branch: chore/bump-grafana-v${{ steps.bump.outputs.new_version }}
          commit-message: |
            chore(grafana): bump to v${{ steps.bump.outputs.new_version }} (~ynh1)
          title: "chore: bump Grafana to v${{ steps.bump.outputs.new_version }} (base: testing)"
          body: |
            Automated bump detected a new Grafana OSS release.

            **New version:** `${{ steps.bump.outputs.new_version }} ~ynh1`

            **Assets**
            - amd64.url: `${{ steps.bump.outputs.linux_url }}`  
              sha256: `${{ steps.bump.outputs.linux_sha256 }}`
            - arm64.url: `${{ steps.bump.outputs.arm64_url }}`  
              sha256: `${{ steps.bump.outputs.arm64_sha256 }}`

            _This PR was created by the daily auto-bump workflow (base: testing)._
          delete-branch: true
          labels: |
            autoupdate
            grafana
