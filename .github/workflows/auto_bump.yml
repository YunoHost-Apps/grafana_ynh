name: Auto bump Grafana (OSS)

on:
  schedule:
    # Every day at 07:30
    - cron: "30 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-bump-grafana
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      ######################################################################
      # CHECKOUT TESTING BRANCH (needed to read manifest.toml)
      ######################################################################
      - name: 📂 Checkout testing branch
        uses: actions/checkout@v6
        with:
          #ref: testing
          ref: auto_bump
          fetch-depth: 0

      ######################################################################
      # PYTHON DEPS
      ######################################################################
      - name: 📦 Install Python deps
        run: |
          pip3 install tomlkit packaging

      ######################################################################
      # RUN PYTHON SCRIPT (update manifest)
      ######################################################################
      - name: ✏️ Update manifest.toml
        id: bump
        env:
          MANIFEST: "manifest.toml"
        run: |
          python3 .github/scripts/auto_bump_grafana.py

      ######################################################################
      # CREATE PULL REQUEST
      ######################################################################
      - name: 🔀 Create Pull Request
        if: steps.bump.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          #base: testing
          base: auto_bump
          branch: bump-grafana-v${{ steps.bump.outputs.new_version }}
          commit-message: |
            Bump to v${{ steps.bump.outputs.new_version }} (~ynh1)
          title: "Bump Grafana to v${{ steps.bump.outputs.new_version }}"
          body: |
            Automated bump detected a new Grafana OSS release.

            **New version:** `${{ steps.bump.outputs.new_version }} ~ynh1`

            **Assets**
            - amd64.url: `${{ steps.bump.outputs.linux_url }}`  
              sha256: `${{ steps.bump.outputs.linux_sha256 }}`
            - arm64.url: `${{ steps.bump.outputs.arm64_url }}`  
              sha256: `${{ steps.bump.outputs.arm64_sha256 }}`

            _This PR was created by the daily auto-bump workflow._
          delete-branch: true
          labels: |
            autoupdate
            grafana

      ######################################################################
      # COMMENT: !testme
      ######################################################################
      - name: 💬 Comment !testme
        if: ${{ steps.cpr.outputs.pull-request-number }}
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ steps.cpr.outputs.pull-request-number }}
          body: "!testme"
