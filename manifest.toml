packaging_format = 2

id = "grafana"
name = "Grafana"
description.en = "Metric & analytic dashboards for monitoring"
description.fr = "Tableaux de bord de supervision"

version = "13.0.2~ynh1"

maintainers = ["JimboJoe","ewilly"]

[upstream]
license = "AGPL-3.0-only"
website = "https://grafana.com/"
demo = "https://play.grafana.org"
code = "https://github.com/grafana/grafana"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = true
sso = true

disk = "800M"
ram.build = "200M"
ram.runtime = "200M"

[install]
	[install.domain]
	type = "domain"

	[install.path]
	type = "path"
	default = "/grafana"

	[install.init_main_permission]
	type = "group"
	default = "visitors"

[resources]

	[resources.sources]

	[resources.sources.main]
	amd64.url = "https://dl.grafana.com/grafana/release/13.0.2/grafana_13.0.2_26816849631_linux_amd64.tar.gz"
	amd64.sha256 = "6720d8b0b48d92e2b33b7bf30b38480c12964ccd87285e5e754aa554165edf2d"
	arm64.url = "https://dl.grafana.com/grafana/release/13.0.2/grafana_13.0.2_26816849631_linux_arm64.tar.gz"
	arm64.sha256 = "beabeddf14dd5f435ac0c6d7fac71a585381515e879cc44eeea79a4ff7f7e52c"
	rename = "grafana"

	[resources.system_user]
	allow_email = true

	[resources.install_dir]

	[resources.data_dir]

	[resources.ports]
    main.default = 3000

	[resources.permissions]
	main.url = "/"

	[resources.apt]
	packages = "mariadb-server"

	[resources.database]
	type = "mysql"
