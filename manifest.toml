packaging_format = 2

id = "grafana"
name = "Grafana"
description.en = "Metric & analytic dashboards for monitoring"
description.fr = "Tableaux de bord de supervision"

version = "12.4.2~ynh2"

maintainers = ["JimboJoe","ewilly"]

[upstream]
license = "AGPL-3.0-only"
website = "https://grafana.com/"
demo = "https://play.grafana.org"
code = "https://github.com/grafana/grafana"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = true
sso = true

disk = "800M"
ram.build = "200M"
ram.runtime = "200M"

[install]
	[install.domain]
	type = "domain"

	[install.path]
	type = "path"
	default = "/grafana"

	[install.init_main_permission]
	type = "group"
	default = "visitors"

[resources]

	[resources.sources]

	[resources.sources.main]
	amd64.url = "https://dl.grafana.com/grafana/release/12.4.2/grafana_12.4.2_23531306697_linux_amd64.tar.gz"
	amd64.sha256 = "f240b200a803bf64592fae645331750c2681df5f07496743d714db12393a591f"
	arm64.url = "https://dl.grafana.com/grafana/release/12.4.2/grafana_12.4.2_23531306697_linux_arm64.tar.gz"
	arm64.sha256 = "28f37f0952e923e90aed02c7d71cef7443705a9a37ba5439b76d7f72aeb1a63f"
	rename = "grafana"

	[resources.system_user]
	allow_email = true

	[resources.install_dir]

	[resources.data_dir]

	[resources.ports]
    main.default = 3000

	[resources.permissions]
	main.url = "/"

	[resources.apt]
	packages = "mariadb-server"

	[resources.database]
	type = "mysql"
